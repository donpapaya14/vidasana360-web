name: "Article Catch-up"

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  catchup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check and dispatch
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RUNS=$(gh run list --repo "${{ github.repository }}" --workflow "Generate SEO Articles" --limit 10 --json conclusion,createdAt \
            --jq "[.[] | select(.createdAt >= \"${TODAY}T00:00:00Z\" and .conclusion == \"success\")] | length" 2>/dev/null || echo 0)

          if [ "$RUNS" -gt 0 ]; then
            echo "Articles already ran today ($RUNS successful)"
            echo "status=ok" >> $GITHUB_OUTPUT
            echo "count=$RUNS" >> $GITHUB_OUTPUT
          else
            echo "No successful article run today, dispatching..."
            gh workflow run "Generate SEO Articles" --repo "${{ github.repository }}" || true
            echo "status=dispatched" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ steps.check.outputs.status }}"
          HOUR=$(date -u +%H:%M)
          if [ "$STATUS" = "ok" ]; then
            MSG="✅ <b>Art Catch-up ${HOUR}</b> VidaSana360 — artículos ya generados"
          else
            MSG="🔄 <b>Art Catch-up ${HOUR}</b> VidaSana360 — no generados, relanzado"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="$MSG" || true
