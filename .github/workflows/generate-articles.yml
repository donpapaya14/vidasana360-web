name: Generate SEO Articles

on:
  schedule:
    - cron: '0 7 * * *'     # 6 artículos de calidad
  workflow_dispatch:
    inputs:
      count:
        description: 'Número de artículos a generar'
        required: false
        default: '6'
        type: choice
        options: ['1', '2', '3', '5', '6']

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine article count
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "count=${{ github.event.inputs.count }}" >> $GITHUB_OUTPUT
          else
            echo "count=6" >> $GITHUB_OUTPUT
          fi

      - name: Generate articles
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          for i in $(seq 1 ${{ steps.config.outputs.count }}); do
            echo "--- Generando artículo $i ---"
            python scripts/generate_article.py || echo "⚠ Artículo $i falló, continuando..."
            if [ $i -lt ${{ steps.config.outputs.count }} ]; then
              sleep 20
            fi
          done

      - name: Build check
        run: |
          npm run build
          echo "✓ Build OK"

      - name: Commit and push
        if: success()
        run: |
          git config user.name "VidaSana360 Bot"
          git config user.email "vladys.z96@gmail.com"
          git add src/content/blog/
          if git diff --staged --quiet; then
            echo "No new articles to commit"
          else
            ARTICLE_COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
            git commit -m "articulo: auto-generated $(date +%Y-%m-%d) ($ARTICLE_COUNT new)"
            git push
          fi

      - name: Fix and retry on build failure
        if: failure()
        run: |
          echo "Build falló. Eliminando artículos problemáticos..."
          # Try removing articles one by one until build passes
          for f in $(git diff --name-only -- src/content/blog/); do
            git checkout -- "$f" 2>/dev/null && echo "Reverted: $f"
          done
          echo "Artículos problemáticos revertidos"
